<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medições PPCI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gantt-chart, .curva-s-container { height: 400px; width: 100%; margin-bottom: 20px; }
        .tab-btn { @apply px-6 py-2 rounded-full font-medium transition-all cursor-pointer; }
        .tab-btn.active { @apply bg-blue-600 text-white shadow-lg; }
        .tab-btn:hover { @apply bg-gray-300; }
        .btn { @apply px-4 py-2 rounded-md font-medium transition-colors inline-flex items-center space-x-2; }
        .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700; }
        .btn-secondary { @apply bg-gray-500 text-white hover:bg-gray-600; }
        .card { @apply bg-white p-6 rounded-lg shadow-xl; }
        .obra-card, .tarefa-card, .despesa-item { @apply border border-gray-200 p-4 rounded-lg hover:shadow-md transition-shadow; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-indigo-900 min-h-screen p-4">
    <div id="app" class="max-w-7xl mx-auto">
        <!-- Header -->
        <div id="header-container" class="flex flex-col md:flex-row items-center justify-between mb-8 text-white space-y-4 md:space-y-0">
            <div class="flex items-center space-x-4">
                <img src="https://via.placeholder.com/80x80/3b82f6/ffffff?text=PPCI" alt="Logo PPCI" class="w-20 h-20 rounded-full shadow-lg">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold">Medições PPCI</h1>
                    <p class="opacity-90">Gestão de Obras - Engenharia de Incêndio</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <span>ID: <span id="userIdDisplay" class="font-mono font-bold bg-blue-500 px-2 py-1 rounded text-sm"></span></span>
                <button id="logout-btn" class="btn btn-secondary">Sair</button>
            </div>
        </div>

        <div id="main-content">
            <!-- Login View -->
            <div id="login-view" class="card max-w-md mx-auto">
                <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">Bem-vindo!</h2>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="login-email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm" required>
                    </div>
                    <div>
                        <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                        <input type="password" id="login-password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full py-3 text-lg">Entrar</button>
                    <button type="button" id="create-account-btn" class="btn btn-secondary w-full py-3">Criar Conta</button>
                </form>
            </div>

            <!-- App View -->
            <div id="app-view" class="hidden">
                <!-- Tabs -->
                <div class="flex flex-wrap justify-center bg-white/20 backdrop-blur-md p-2 rounded-2xl mb-8 shadow-xl space-x-2 md:space-x-4">
                    <button class="tab-btn active" data-tab="obras">🏗️ Obras</button>
                    <button class="tab-btn" data-tab="tarefas">📋 Tarefas</button>
                    <button class="tab-btn" data-tab="cronograma">📊 Cronograma</button>
                    <button class="tab-btn" data-tab="relatorios">📈 Relatórios</button>
                    <button class="tab-btn" data-tab="despesas">💰 Despesas</button>
                </div>

                <div id="content" class="space-y-6">
                    <!-- Obras View -->
                    <div id="obras-view" class="tab-content active">
                        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                            <h2 class="text-3xl font-bold text-white">Gerenciar Obras</h2>
                            <button id="add-obra-btn" class="btn btn-primary text-lg">
                                ➕ Nova Obra
                            </button>
                        </div>
                        <div id="obras-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    </div>

                    <!-- Tarefas View -->
                    <div id="tarefas-view" class="tab-content hidden">
                        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                            <h2 class="text-3xl font-bold text-white">Tarefas da Obra</h2>
                            <button id="add-tarefa-btn" class="btn btn-primary text-lg">
                                ➕ Nova Tarefa
                            </button>
                        </div>
                        <div id="tarefas-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                    </div>

                    <!-- Cronograma View - ATUALIZADA -->
                    <div id="cronograma-view" class="tab-content hidden">
                        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                            <h2 class="text-3xl font-bold text-white">Cronograma & Curva S</h2>
                            <div class="flex space-x-2">
                                <button id="gerar-cronograma-btn" class="btn btn-secondary text-lg">
                                    🔄 Gerar Cronograma
                                </button>
                            </div>
                        </div>
                        <div class="bg-white/10 backdrop-blur-md p-6 rounded-xl mb-6">
                            <label for="cronograma-dias" class="block text-lg font-semibold text-white mb-2">Duração Total (dias)</label>
                            <input type="number" id="cronograma-dias" value="90" min="1" class="w-full md:w-32 px-4 py-3 rounded-lg bg-white/80 shadow-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="gantt-container bg-white/10 backdrop-blur-md p-6 rounded-xl">
                            <h3 class="text-2xl font-bold text-white mb-4">📋 Gantt Chart</h3>
                            <canvas id="gantt-chart" class="gantt-chart"></canvas>
                        </div>
                        <div class="curva-s-container bg-white/10 backdrop-blur-md p-6 rounded-xl">
                            <h3 class="text-2xl font-bold text-white mb-4">📈 Curva S - Planejada (Azul) vs Real (Vermelho)</h3>
                            <canvas id="curva-s-chart"></canvas>
                        </div>
                        <!-- NOVA SEÇÃO: Medições -->
                        <div class="bg-white/10 backdrop-blur-md p-6 rounded-xl mt-6">
                            <h3 class="text-2xl font-bold text-white mb-4">📊 Medições (% Concluída por Tarefa)</h3>
                            <div id="medicoes-list" class="space-y-4 max-h-96 overflow-y-auto"></div>
                            <button id="salvar-medicoes-btn" class="btn btn-primary mt-6 text-lg w-full md:w-auto">
                                💾 Salvar Medições
                            </button>
                        </div>
                    </div>

                    <!-- Relatórios View (placeholder) -->
                    <div id="relatorios-view" class="tab-content hidden">
                        <h2 class="text-3xl font-bold text-white mb-6">Relatórios</h2>
                        <div id="relatorio-content" class="bg-white/10 p-6 rounded-xl">Selecione uma obra para gerar relatórios.</div>
                    </div>

                    <!-- Despesas View (resumido) -->
                    <div id="despesas-view" class="tab-content hidden">
                        <h2 class="text-3xl font-bold text-white mb-6">Despesas</h2>
                        <div id="despesas-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                    </div>
                </div>
            </div>

            <!-- Modal -->
            <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                <div class="bg-white rounded-2xl p-8 shadow-2xl max-w-md w-full max-h-[90vh] overflow-y-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h3 id="modal-title" class="text-2xl font-bold text-gray-800"></h3>
                        <button id="close-modal-btn" class="text-2xl text-gray-500 hover:text-gray-700">&times;</button>
                    </div>
                    <div id="modal-body"></div>
                </div>
            </div>
        </div>

        <script type="module">
            // Firebase Config - SUBSTITUA PELAS SUAS CREDENCIAIS
          const firebaseConfig = {
      apiKey: "AIzaSyDrTvlOw8Ug2-GvBa2hkqDYKF7avhZ5cFA",
      authDomain: "medicoes-ppci.firebaseapp.com",
      projectId: "medicoes-ppci",
      storageBucket: "medicoes-ppci.firebasestorage.app",
      messagingSenderId: "408815173796",
      appId: "1:408815173796:web:efd25d921a7f0ee923e631",
      measurementId: "G-9YW2XQH2HH"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            let currentUser = null;
            let obraId = null; // Global para obra selecionada
            let window.tarefas = []; // Tarefas globais

            // Funções Utilitárias
            function showModal(title, body) {
                document.getElementById('modal-title').textContent = title;
                document.getElementById('modal-body').innerHTML = body;
                document.getElementById('modal').classList.remove('hidden');
            }
            function hideModal() {
                document.getElementById('modal').classList.add('hidden');
            }

            // Auth
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                try {
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    currentUser = userCredential.user;
                    document.getElementById('userIdDisplay').textContent = currentUser.uid.slice(0,8);
                    document.getElementById('login-view').classList.add('hidden');
                    document.getElementById('app-view').classList.remove('hidden');
                    loadObras();
                } catch (error) {
                    alert('Erro no login: ' + error.message);
                }
            });
            document.getElementById('create-account-btn').addEventListener('click', () => {
                showModal('Criar Conta', `
                    <form id="create-form">
                        <div class="space-y-4">
                            <input type="text" id="nome" placeholder="Nome Completo" class="w-full p-3 border rounded-lg" required>
                            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded-lg" required>
                            <input type="password" id="password" placeholder="Senha (min 6 chars)" class="w-full p-3 border rounded-lg" required>
                            <button type="submit" class="btn btn-primary w-full">Criar</button>
                        </form>
                `);
                document.getElementById('create-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    try {
                        await auth.createUserWithEmailAndPassword(email, password);
                        hideModal();
                        alert('Conta criada! Faça login.');
                    } catch (error) {
                        alert('Erro: ' + error.message);
                    }
                });
            });
            document.getElementById('logout-btn').addEventListener('click', () => auth.signOut().then(() => location.reload()));

            // Tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab + '-view').classList.remove('hidden');
                    if (btn.dataset.tab === 'cronograma' && obraId) {
                        loadCronograma();
                        loadMedicoes();
                        renderMedicoesList();
                    } else if (btn.dataset.tab === 'obras') {
                        loadObras();
                    } else if (btn.dataset.tab === 'tarefas' && obraId) {
                        loadTarefas();
                    }
                });
            });

            // Obras
            async function loadObras() {
                const list = document.getElementById('obras-list');
                list.innerHTML = '';
                const snapshot = await db.collection('obras').get();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="obra-card p-6 bg-gradient-to-r from-blue-50 to-indigo-50">
                            <h3 class="font-bold text-xl mb-2">${data.nome}</h3>
                            <p class="text-gray-600 mb-4">${data.descricao}</p>
                            <div class="flex space-x-2">
                                <button onclick="selectObra('${doc.id}')" class="btn btn-primary px-4 py-2 text-sm">Selecionar</button>
                                <button onclick="deleteObra('${doc.id}')" class="btn btn-secondary px-4 py-2 text-sm">Excluir</button>
                            </div>
                        </div>
                    `;
                });
            }
            window.selectObra = async (id) => {
                obraId = id;
                alert('Obra selecionada! Vá para Tarefas ou Cronograma.');
            };
            window.deleteObra = async (id) => {
                if (confirm('Excluir obra?')) await db.collection('obras').doc(id).delete(); loadObras();
            };
            document.getElementById('add-obra-btn').addEventListener('click', () => {
                showModal('Nova Obra', `
                    <form id="obra-form">
                        <div class="space-y-4">
                            <input type="text" id="obra-nome" placeholder="Nome da Obra" required class="w-full p-3 border rounded-lg">
                            <textarea id="obra-desc" placeholder="Descrição" class="w-full p-3 border rounded-lg" rows="3"></textarea>
                            <button type="submit" class="btn btn-primary w-full">Salvar</button>
                        </form>
                `);
                document.getElementById('obra-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await db.collection('obras').add({
                        nome: document.getElementById('obra-nome').value,
                        descricao: document.getElementById('obra-desc').value
                    });
                    hideModal(); loadObras();
                });
            });

            // Tarefas (simplificado)
            async function loadTarefas() {
                const list = document.getElementById('tarefas-list');
                list.innerHTML = '';
                const snapshot = await db.collection('tarefas').where('obraId', '==', obraId).get();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="tarefa-card">
                            <h4 class="font-bold">${data.nome}</h4>
                            <p>Peso: ${data.peso || 1}</p>
                        </div>
                    `;
                });
            }
            document.getElementById('add-tarefa-btn').addEventListener('click', () => {
                showModal('Nova Tarefa', `
                    <form id="tarefa-form">
                        <input type="text" id="tarefa-nome" placeholder="Nome" required class="w-full p-3 border rounded-lg mb-4">
                        <input type="number" id="tarefa-peso" placeholder="Peso/Duração" value="1" min="1" class="w-full p-3 border rounded-lg">
                        <button type="submit" class="btn btn-primary w-full mt-4">Salvar</button>
                    </form>
                `);
                document.getElementById('tarefa-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await db.collection('tarefas').add({
                        nome: document.getElementById('tarefa-nome').value,
                        peso: parseInt(document.getElementById('tarefa-peso').value),
                        obraId: obraId
                    });
                    hideModal(); loadTarefas();
                });
            });

            // CRONOGRAMA - FUNÇÕES COMPLETAS
            async function loadCronograma() {
                if (!obraId) return alert('Selecione uma obra primeiro.');
                try {
                    const tarefasRef = db.collection('tarefas').where('obraId', '==', obraId);
                    const snapshot = await tarefasRef.get();
                    window.tarefas = [];
                    snapshot.forEach(doc => window.tarefas.push({ id: doc.id, ...doc.data() }));
                    console.log('Tarefas carregadas:', window.tarefas);
                } catch (e) {
                    alert('Erro ao carregar tarefas.');
                }
            }

            async function generateGantt() {
                const totalDias = parseInt(document.getElementById('cronograma-dias').value);
                if (!totalDias || totalDias &lt;= 0 || window.tarefas.length === 0) return alert('Defina dias e adicione tarefas.');
                let currentDay = 0;
                const ganttData = window.tarefas.map(t => {
                    const duration = t.peso || 1;
                    const start = currentDay;
                    const end = start + duration;
                    currentDay = end;
                    return { id: t.id, name: t.nome, start, end, duration, plannedProgress: 0 };
                });
                await db.collection('cronograma').doc(obraId).set({ tarefas: ganttData, totalDias });
                const ctx = document.getElementById('gantt-chart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ganttData.map(t => t.name),
                        datasets: [{ label: 'Dias', data: ganttData.map(t => ({ x: [t.start, t.end], y: t.name })), backgroundColor: 'rgba(34,197,94,0.6)', borderColor: 'rgba(34,197,94,1)', borderWidth: 2 }]
                    },
                    options: { indexAxis: 'y', scales: { x: { title: { display: true, text: 'Dias' }, min: 0, max: totalDias } }, plugins: { legend: { display: false } } }
                });
                updateCurvaS(ganttData);
            }

            async function updateCurvaS(ganttData) {
                const totalDias = parseInt(document.getElementById('cronograma-dias').value);
                const ctx = document.getElementById('curva-s-chart').getContext('2d');
                const plannedData = Array.from({ length: totalDias + 1 }, (_, i) => (i / totalDias) * 100);
                const realData = await calculateRealProgress();
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: Array.from({ length: totalDias + 1 }, (_, i) => `Dia ${i}`),
                        datasets: [
                            { label: 'Planejada', data: plannedData, borderColor: 'blue', backgroundColor: 'rgba(59,130,246,0.1)', tension: 0.4, fill: true },
                            { label: 'Real', data: realData, borderColor: 'red', backgroundColor: 'rgba(239,68,68,0.1)', tension: 0.4, fill: true }
                        ]
                    },
                    options: { scales: { x: { title: { display: true, text: 'Dias' } }, y: { title: { display: true, text: '%' }, min: 0, max: 100 } } }
                });
            }

            async function calculateRealProgress() {
                const medicoesRef = await db.collection('medicoes').doc(obraId).get();
                const medicoes = medicoesRef.exists ? medicoesRef.data() : {};
                const totalPeso = window.tarefas.reduce((sum, t) => sum + (t.peso || 1), 0);
                const totalDias = parseInt(document.getElementById('cronograma-dias').value);
                return Array.from({ length: totalDias + 1 }, (_, dia) => {
                    let progress = 0;
                    window.tarefas.forEach(t => {
                        const perc = medicoes[t.id] || 0;
                        progress += ((t.peso || 1) / totalPeso) * perc;
                    });
                    return (progress / totalDias) * 100; // Cumulativo simplificado
                });
            }

            async function loadMedicoes() {
                const medicoesRef = await db.collection('medicoes').doc(obraId).get();
                if (medicoesRef.exists) {
                    const medicoes = medicoesRef.data();
                    window.tarefas.forEach(t => {
                        const input = document.getElementById(`medicao-${t.id}`);
                        if (input) input.value = medicoes[t.id] || 0;
                    });
                }
            }

            async function saveMedicoes() {
                const medicoes = {};
                window.tarefas.forEach(t => {
                    const input = document.getElementById(`medicao-${t.id}`);
                    medicoes[t.id] = parseFloat(input?.value || 0);
                });
                await db.collection('medicoes').doc(obraId).set(medicoes);
                alert('✅ Medições salvas! Curva S atualizada.');
                const cronRef = await db.collection('cronograma').doc(obraId).get();
                if (cronRef.exists) updateCurvaS(cronRef.data().tarefas);
            }

            function renderMedicoesList() {
                const list = document.getElementById('medicoes-list');
                list.innerHTML = window.tarefas.map(t => `
                    <div class="flex items-center justify-between p-4 bg-white/50 rounded-lg">
                        <span class="font-medium">${t.nome} (Peso: ${t.peso || 1})</span>
                        <div class="flex items-center space-x-2">
                            <input type="number" id="medicao-${t.id}" min="0" max="100" value="0" class="w-20 p-2 border rounded">
                            <span>%</span>
                        </div>
                    </div>
                `).join('');
            }

            // Event Listeners para Cronograma
            document.getElementById('gerar-cronograma-btn').addEventListener('click', generateGantt);
            document.getElementById('salvar-medicoes-btn').addEventListener('click', saveMedicoes);

            // Modais Gerais
            document.getElementById('close-modal-btn').addEventListener('click', hideModal);
            document.getElementById('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') hideModal(); });

            // Init
            auth.onAuthStateChanged(user => { if (user) { currentUser = user; document.getElementById('userIdDisplay').textContent = user.uid.slice(0,8); loadObras(); } });
        </script>
    </div>
</body>
</html>
